name: Trivy

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Trivy filesystem scan (vulnerabilities, secrets, misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'   # report to code scanning; don't fail the job on findings
      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
